<header class="header-container">
  <div class="page-title">
    <h2>Control Center</h2>
    <span class="status-indicator">
      <span class="pulse"></span>
      System Live
    </span>
  </div>

  <div class="header-actions">

    <button class="action-btn notifications" aria-label="Notifications" (click)="toggleNotifications()">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>

      @if (unreadCount > 0) {
      <span class="badge">{{ unreadCount }}</span>
      }
    </button>

    @if (showNotifications) {
    <div class="notifications-dropdown">

      <div class="dropdown-header">
        <h3>Alert History</h3>
        <button class="close-btn" (click)="showNotifications = false">Close</button>
      </div>

      <div class="dropdown-body">
        @for (notif of notifications; track notif.id) {
        <div class="notif-item" [class.unread]="notif.isUnread" (click)="markAsRead(notif.id)">
          <div class="notif-icon" [ngClass]="notif.type">
            <div class="dot"></div>
          </div>
          <div class="notif-content">
            <p>{{ notif.message }}</p>
            <span class="time">{{ notif.time }}</span>
          </div>
          @if (notif.isUnread) { <div class="unread-dot"></div> }
        </div>
        } @empty {
        <div class="empty-state">No new alerts</div>
        }
      </div>

      <div class="dropdown-footer">
        <a href="#">Clear all notifications</a>
      </div>

    </div>
    }

  </div>
</header>

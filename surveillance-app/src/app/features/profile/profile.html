<div class="page-wrapper">
    <header class="page-header">
        <div class="header-info">
            <h1>User Account</h1>
            <p class="subtitle">Manage your personal credentials and security.</p>
        </div>
    </header>

    @if (profile$ | async; as profile) {
    <div class="settings-grid">
        <div class="settings-card profile-card">
            <h3>Account Profile</h3>
            <div class="card-content">
                <div class="avatar-lg">{{ profile.avatar }}</div>
                <div class="profile-info">
                    <label>Full Name</label>
                    <input type="text" [value]="profile.name" readonly class="locked-input">
                    <label>Email Address</label>
                    <input type="email" [value]="profile.email" readonly class="locked-input">
                    <label>System Role</label>
                    <span class="role-badge">{{ profile.role }}</span>
                </div>
            </div>
        </div>
    </div>
    }
</div>

<div class="auth-wrapper">
  <div class="auth-card">

    <div class="brand-header">
      <div class="logo-icon">
        <div class="inner-dot"></div>
      </div>
      <h2 class="brand-name">Viorex<span>360</span></h2>
    </div>

    <div class="auth-texts">
      <h1>Welcome Back</h1>
      <p>Enter your credentials to access the control center.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" formControlName="email" placeholder="admin@viorex.com" autocomplete="off">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" placeholder="••••••••">
      </div>

      @if (hasError) {
      <div class="error-message">
        <i class="fa-solid fa-triangle-exclamation"></i> Invalid email or password.
      </div>
      }

      <button type="submit" class="submit-btn" [disabled]="loginForm.invalid">
        Access System
      </button>

    </form>

    <div class="auth-footer">
      <p>Secure connection established.</p>
    </div>

  </div>
</div>
